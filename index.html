<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARTGEN PRO :: Resource Creation Portal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .app-container {
            background: #ffffff;
            border: 2px solid #333;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .header {
            background: #333;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .section {
            padding: 20px;
            border-bottom: 2px solid #eee;
        }
        .section-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #222;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.95em;
            font-weight: bold;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
        }
        .api-key-box {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            font-weight: normal;
            color: #333;
            cursor: pointer;
        }
        .radio-label input {
            margin-right: 8px;
        }
        .action-btn {
            background: #0056b3;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .action-btn:hover:not(:disabled) {
            background: #004494;
        }
        .action-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .preview-area {
            background: #fafafa;
            border: 1px dashed #ccc;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            color: #777;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            overflow: auto; /* Allow scrolling for large charts */
        }
        #mermaid-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0056b3;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .export-options {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <span>CHARTGEN PRO :: Resource Creation Portal</span>
        <button style="background:none;border:none;color:#fff;cursor:pointer;font-weight:bold;">[X]</button>
    </div>

    <div class="section">
        <div class="section-title">1. CREATE NEW CHART</div>
        
        <div class="form-group api-key-box">
            <label for="groqKey">Groq API Key:</label>
            <input type="password" id="groqKey" placeholder="gsk_..." required>
            <small style="color:#666; display:block; margin-top:5px;">Your key is stored locally in your browser and never sent anywhere except directly to Groq.</small>
        </div>

        <div class="form-group">
            <label for="contentInput">Content / Context / Object Input:</label>
            <input type="text" id="contentInput" value="Human Eye Anatomy">
        </div>

        <div class="form-group">
            <label>Select Chart Type (Mermaid.js Supported):</label>
            <div class="chart-grid">
                <label class="radio-label"><input type="radio" name="chartType" value="mindmap"> Mind Map</label>
                <label class="radio-label"><input type="radio" name="chartType" value="timeline"> Timeline</label>
                <label class="radio-label"><input type="radio" name="chartType" value="flowchart" checked> Flowchart / Process</label>
                <label class="radio-label"><input type="radio" name="chartType" value="pie"> Pie Chart</label>
                <label class="radio-label"><input type="radio" name="chartType" value="classDiagram"> Entity / Class Diagram</label>
                <label class="radio-label"><input type="radio" name="chartType" value="sequenceDiagram"> Sequence Diagram</label>
            </div>
        </div>

        <button class="action-btn" id="generateBtn">GENERATE DRAFT</button>
    </div>

    <div class="section">
        <div class="section-title">2. PREVIEW DRAFT</div>
        
        <div class="preview-area" id="previewArea">
            <span id="previewText">(The generated simulation will appear here)</span>
            <div class="loader" id="loader"></div>
            <div id="mermaid-container"></div>
        </div>

        <button class="action-btn" style="background: #555;" id="enlargeBtn" disabled>&gt; CLICK TO ENLARGE PREVIEW</button>
    </div>

    <div class="section">
        <div class="section-title">3. EXPORT</div>
        
        <div class="form-group export-options">
            <label style="display:inline; margin-right: 10px; font-weight:normal;">Format:</label>
            <label class="radio-label"><input type="radio" name="exportFormat" value="pdf" checked> PDF (.pdf)</label>
            <label class="radio-label"><input type="radio" name="exportFormat" value="png"> High-Res Image (.png)</label>
        </div>

        <button class="action-btn" style="background: #28a745;" id="downloadBtn" disabled>DOWNLOAD FILE</button>
    </div>
</div>

<script>
    // Initialize Mermaid
    mermaid.initialize({ startOnLoad: false, theme: 'default' });

    // Elements
    const apiKeyInput = document.getElementById('groqKey');
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const enlargeBtn = document.getElementById('enlargeBtn');
    const contentInput = document.getElementById('contentInput');
    const previewText = document.getElementById('previewText');
    const loader = document.getElementById('loader');
    const mermaidContainer = document.getElementById('mermaid-container');

    // Load saved API key if it exists
    if(localStorage.getItem('groqApiKey')) {
        apiKeyInput.value = localStorage.getItem('groqApiKey');
    }

    // --- 1. GENERATE CHART via GROQ ---
    generateBtn.addEventListener('click', async () => {
        const apiKey = apiKeyInput.value.trim();
        const topic = contentInput.value.trim();
        const type = document.querySelector('input[name="chartType"]:checked').value;
        
        if (!apiKey) return alert("Please enter your Groq API Key!");
        if (!topic) return alert("Please enter a subject!");

        // Save API key to local storage for convenience
        localStorage.setItem('groqApiKey', apiKey);

        // Update UI
        previewText.style.display = "none";
        mermaidContainer.innerHTML = "";
        loader.style.display = "block";
        generateBtn.disabled = true;
        downloadBtn.disabled = true;
        enlargeBtn.disabled = true;

        // Strict prompt engineering to ensure we ONLY get Mermaid code back
        const prompt = `You are an expert data visualization assistant. Create a highly detailed and educational Mermaid.js diagram for the topic: "${topic}". 
        Use the Mermaid chart type: "${type}". 
        CRITICAL: Output ONLY valid Mermaid code. Do not wrap it in markdown code blocks (like \`\`\`mermaid). Do not add any conversational text, introductions, or explanations. Start immediately with the chart type keyword (e.g., flowchart TD, mindmap, timeline). Ensure syntax is perfectly valid.`;

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama3-70b-8192", // Using Llama 3 70B for strong reasoning/syntax
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.1 // Low temperature for deterministic, structured output
                })
            });

            if (!response.ok) throw new Error(`API Error: ${response.statusText}`);

            const data = await response.json();
            let mermaidCode = data.choices[0].message.content.trim();

            // Cleanup potential markdown blocks if the LLM disobeys the prompt
            if (mermaidCode.startsWith('```')) {
                mermaidCode = mermaidCode.replace(/^```mermaid\n?/g, '').replace(/^```\n?/g, '').replace(/```$/g, '').trim();
            }

            // Render the Mermaid code
            loader.style.display = "none";
            const id = 'mermaid-svg-' + Date.now();
            const { svg } = await mermaid.render(id, mermaidCode);
            mermaidContainer.innerHTML = svg;
            
            generateBtn.disabled = false;
            downloadBtn.disabled = false;
            enlargeBtn.disabled = false;

        } catch (error) {
            console.error(error);
            alert("Error generating chart. Check your API key or try a simpler topic.\n\nDetails: " + error.message);
            loader.style.display = "none";
            previewText.style.display = "block";
            generateBtn.disabled = false;
        }
    });

    // --- 2. ENLARGE PREVIEW ---
    enlargeBtn.addEventListener('click', () => {
        const svgElement = mermaidContainer.querySelector('svg');
        if (svgElement) {
            // Serialize the SVG and open in a new tab
            const serializer = new XMLSerializer();
            const svgString = serializer.serializeToString(svgElement);
            const blob = new Blob([svgString], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        }
    });

    // --- 3. EXPORT / DOWNLOAD ---
    downloadBtn.addEventListener('click', async () => {
        const exportFormat = document.querySelector('input[name="exportFormat"]:checked').value;
        const safeTopicName = contentInput.value.trim().replace(/[^a-z0-9]/gi, '_').toLowerCase();
        
        // We use html2canvas to convert the rendered SVG DOM element into a standard canvas/image
        const canvas = await html2canvas(mermaidContainer, {
            scale: 2, // Higher resolution
            backgroundColor: "#ffffff"
        });

        const imgData = canvas.toDataURL('image/png');

        if (exportFormat === 'png') {
            const link = document.createElement('a');
            link.href = imgData;
            link.download = `chartgen_${safeTopicName}.png`;
            link.click();
        } else if (exportFormat === 'pdf') {
            const { jsPDF } = window.jspdf;
            
            // Calculate aspect ratio to fit into PDF nicely
            const imgWidth = 210; // A4 width in mm
            const pageHeight = 295; // A4 height in mm
            const imgHeight = canvas.height * imgWidth / canvas.width;
            
            const doc = new jsPDF('p', 'mm', 'a4');
            
            // Add a title to the PDF
            doc.setFontSize(16);
            doc.text(contentInput.value.trim().toUpperCase(), 105, 15, { align: "center" });
            
            // Add the image
            doc.addImage(imgData, 'PNG', 0, 25, imgWidth, imgHeight);
            doc.save(`chartgen_${safeTopicName}.pdf`);
        }
    });
</script>

</body>
</html>
