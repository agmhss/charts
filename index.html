<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARTGEN PRO :: Resource Creation Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .app-container {
            background: #ffffff;
            border: 2px solid #333;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .header {
            background: #333;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .close-btn {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            cursor: pointer;
            padding: 2px 6px;
            font-weight: bold;
        }
        .section {
            padding: 20px;
            border-bottom: 2px solid #eee;
        }
        .section:last-child {
            border-bottom: none;
        }
        .section-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #222;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.95em;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            font-weight: normal;
            color: #333;
            cursor: pointer;
        }
        .radio-label input {
            margin-right: 8px;
        }
        .action-btn {
            background: #0056b3;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .action-btn:hover {
            background: #004494;
        }
        .action-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .preview-area {
            background: #fafafa;
            border: 1px dashed #ccc;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            color: #777;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #generatedImage {
            max-width: 100%;
            height: auto;
            display: none;
            border: 1px solid #ddd;
            margin-top: 10px;
        }
        .export-options {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0056b3;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <span>CHARTGEN PRO :: Resource Creation Portal</span>
        <button class="close-btn" title="Close">[X]</button>
    </div>

    <div class="section">
        <div class="section-title">1. CREATE NEW CHART</div>
        
        <div class="form-group">
            <label for="contentInput">Content / Context / Object Input:</label>
            <input type="text" id="contentInput" value="Human Eye Anatomy">
        </div>

        <div class="form-group">
            <label>Select Chart Type:</label>
            <div class="chart-grid">
                <label class="radio-label"><input type="radio" name="chartType" value="Venn Diagram"> Venn Diagram</label>
                <label class="radio-label"><input type="radio" name="chartType" value="Timeline"> Timeline</label>
                <label class="radio-label"><input type="radio" name="chartType" value="Mind Map"> Mind Map</label>
                <label class="radio-label"><input type="radio" name="chartType" value="Flowchart"> Flowchart</label>
                <label class="radio-label"><input type="radio" name="chartType" value="Infographic (Cutaway)" checked> Infographic (Cutaway)</label>
                <label class="radio-label"><input type="radio" name="chartType" value="Pictograph"> Pictograph</label>
                <label class="radio-label"><input type="radio" name="chartType" value="Comparison Table"> Comparison Table</label>
            </div>
        </div>

        <button class="action-btn" id="generateBtn">GENERATE DRAFT</button>
    </div>

    <div class="section">
        <div class="section-title">2. PREVIEW DRAFT</div>
        
        <div class="preview-area" id="previewContainer">
            <span id="previewText">(The generated simulation will appear here)</span>
            <div class="loader" id="loader"></div>
            <img id="generatedImage" alt="Generated Chart" crossorigin="anonymous">
        </div>

        <button class="action-btn" style="background: #555;" id="enlargeBtn" disabled>&gt; CLICK TO ENLARGE PREVIEW</button>
    </div>

    <div class="section">
        <div class="section-title">3. EXPORT</div>
        
        <div class="form-group export-options">
            <label style="display:inline; margin-right: 10px;">Format:</label>
            <label class="radio-label"><input type="radio" name="exportFormat" value="pdf" checked> PDF (.pdf)</label>
            <label class="radio-label"><input type="radio" name="exportFormat" value="png"> High-Res Image (.png)</label>
        </div>

        <button class="action-btn" style="background: #28a745;" id="downloadBtn" disabled>DOWNLOAD FILE</button>
    </div>
</div>

<script>
    // Elements
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const enlargeBtn = document.getElementById('enlargeBtn');
    const contentInput = document.getElementById('contentInput');
    const generatedImage = document.getElementById('generatedImage');
    const previewText = document.getElementById('previewText');
    const loader = document.getElementById('loader');

    // State variable to hold the fetched image blob
    let currentImageBlob = null;

    // --- 1. GENERATE CHART ---
    generateBtn.addEventListener('click', async () => {
        const topic = contentInput.value.trim();
        const type = document.querySelector('input[name="chartType"]:checked').value;
        
        if (!topic) return alert("Please enter a subject!");

        // Update UI to loading state
        previewText.style.display = "none";
        generatedImage.style.display = "none";
        loader.style.display = "block";
        generateBtn.disabled = true;
        downloadBtn.disabled = true;
        enlargeBtn.disabled = true;

        // Construct a prompt for the AI
        const prompt = `A detailed professional ${type} illustrating ${topic}, clean educational layout, white background, infographic style`;
        // Using Pollinations free AI image generator API
        const aiUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=800&height=600&nologo=true`;

        try {
            // Fetch the image as a Blob so we can cleanly export it later without CORS issues
            const response = await fetch(aiUrl);
            currentImageBlob = await response.blob();
            
            // Create a local URL for the preview
            const objectUrl = URL.createObjectURL(currentImageBlob);
            generatedImage.src = objectUrl;
            
            // Once image loads in the UI, reset states
            generatedImage.onload = () => {
                loader.style.display = "none";
                generatedImage.style.display = "block";
                generateBtn.disabled = false;
                downloadBtn.disabled = false;
                enlargeBtn.disabled = false;
            };
        } catch (error) {
            alert("Error generating image. Please try again.");
            loader.style.display = "none";
            previewText.style.display = "block";
            generateBtn.disabled = false;
        }
    });

    // --- 2. ENLARGE PREVIEW ---
    enlargeBtn.addEventListener('click', () => {
        if (generatedImage.src) {
            // Open the generated image in a new tab
            window.open(generatedImage.src, '_blank');
        }
    });

    // --- 3. EXPORT / DOWNLOAD ---
    downloadBtn.addEventListener('click', () => {
        if (!currentImageBlob) return;

        const exportFormat = document.querySelector('input[name="exportFormat"]:checked').value;
        const safeTopicName = contentInput.value.trim().replace(/[^a-z0-9]/gi, '_').toLowerCase();

        if (exportFormat === 'png') {
            // Download as PNG
            const link = document.createElement('a');
            link.href = URL.createObjectURL(currentImageBlob);
            link.download = `chartgen_${safeTopicName}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } else if (exportFormat === 'pdf') {
            // Download as PDF using jsPDF
            const reader = new FileReader();
            reader.readAsDataURL(currentImageBlob); 
            reader.onloadend = function() {
                const base64data = reader.result;
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({
                    orientation: "landscape",
                    unit: "px",
                    format: [800, 600] // Matching the AI generation size
                });
                
                doc.addImage(base64data, 'PNG', 0, 0, 800, 600);
                doc.save(`chartgen_${safeTopicName}.pdf`);
            }
        }
    });
</script>

</body>
</html>
