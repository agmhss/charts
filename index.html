<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHARTGEN PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 20px;
    }
    .app-container {
      max-width: 820px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 15px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .header {
      background: #1a3c66;
      color: white;
      padding: 14px 20px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section {
      padding: 20px 24px;
      border-bottom: 1px solid #eee;
    }
    .section:last-child { border-bottom: none; }
    .form-group { margin: 16px 0; }
    label { font-weight: 600; display: block; margin-bottom: 6px; color: #444; }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 15px;
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px 16px;
    }
    .preview-area {
      min-height: 280px;
      background: #f9fafb;
      border: 2px dashed #cbd5e1;
      border-radius: 8px;
      padding: 20px;
      margin: 16px 0;
      position: relative;
      overflow: auto;
    }
    #mermaid-container {
      display: inline-block;
      min-width: 100%;
      text-align: center;
    }
    .loader {
      border: 5px solid #e5e7eb;
      border-top: 5px solid #3b82f6;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      animation: spin 1s linear infinite;
      margin: 80px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .primary   { background: #2563eb; color: white; }
    .primary:hover   { background: #1d4ed8; }
    .success  { background: #16a34a; color: white; }
    .success:hover  { background: #15803d; }
    .secondary { background: #6b7280; color: white; }
    .secondary:hover { background: #4b5563; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .code-editor {
      width: 100%;
      height: 180px;
      font-family: 'Consolas', monospace;
      font-size: 13.5px;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      resize: vertical;
      background: #f8fafc;
    }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <span>CHARTGEN PRO – Educational Diagrams</span>
  </div>

  <div class="section">
    <div class="form-group">
      <label>Groq API Key (stored locally)</label>
      <input type="password" id="groqKey" placeholder="gsk_...">
    </div>

    <div class="form-group">
      <label>Topic / Concept</label>
      <input type="text" id="contentInput" value="Human Eye Anatomy" placeholder="e.g. Photosynthesis process">
    </div>

    <div class="form-group">
      <label>Diagram Type</label>
      <div class="chart-grid">
        <label><input type="radio" name="chartType" value="flowchart" checked> Flowchart</label>
        <label><input type="radio" name="chartType" value="mindmap"> Mindmap</label>
        <label><input type="radio" name="chartType" value="sequenceDiagram"> Sequence</label>
        <label><input type="radio" name="chartType" value="classDiagram"> Class / ER</label>
        <label><input type="radio" name="chartType" value="timeline"> Timeline</label>
        <label><input type="radio" name="chartType" value="pie"> Pie Chart</label>
      </div>
    </div>

    <button class="primary" id="generateBtn">Generate Diagram</button>
  </div>

  <div class="section">
    <h3 style="margin:0 0 12px 0">Preview & Edit</h3>

    <div class="preview-area" id="previewArea">
      <div class="loader" id="loader"></div>
      <div id="mermaid-container"></div>
    </div>

    <textarea class="code-editor" id="mermaidCodeEditor" placeholder="Mermaid code will appear here..."></textarea>

    <div class="controls">
      <button class="primary" id="renderEditedBtn">Render Edited Code</button>
      <button class="secondary" id="enlargeBtn">Open SVG in new tab</button>
    </div>
  </div>

  <div class="section">
    <h3 style="margin:0 0 12px 0">Export</h3>

    <div style="display:flex; gap:24px; align-items:center; flex-wrap:wrap;">
      <label><input type="radio" name="exportFormat" value="png" checked> PNG</label>
      <label><input type="radio" name="exportFormat" value="pdf"> PDF (A4)</label>
    </div>

    <div class="controls">
      <button class="success" id="downloadBtn" disabled>Download</button>
    </div>
  </div>
</div>

<script>
mermaid.initialize({
  startOnLoad: false,
  theme: 'default',
  flowchart: { useMaxWidth: false },
  mindmap:   { useMaxWidth: false },
  sequence:  { useMaxWidth: false }
});

const els = {
  groqKey:        document.getElementById('groqKey'),
  topic:          document.getElementById('contentInput'),
  generateBtn:    document.getElementById('generateBtn'),
  downloadBtn:    document.getElementById('downloadBtn'),
  enlargeBtn:     document.getElementById('enlargeBtn'),
  loader:         document.getElementById('loader'),
  mermaidDiv:     document.getElementById('mermaid-container'),
  codeEditor:     document.getElementById('mermaidCodeEditor'),
  renderEditedBtn:document.getElementById('renderEditedBtn')
};

if (localStorage.getItem('groqApiKey')) {
  els.groqKey.value = localStorage.getItem('groqApiKey');
}

els.generateBtn.onclick = async () => {
  const key   = els.groqKey.value.trim();
  const topic = els.topic.value.trim();
  const type  = document.querySelector('input[name="chartType"]:checked')?.value;

  if (!key)   return alert("API key required");
  if (!topic) return alert("Please enter a topic");

  localStorage.setItem('groqApiKey', key);

  els.loader.style.display = 'block';
  els.generateBtn.disabled = true;
  els.downloadBtn.disabled = true;
  els.mermaidDiv.innerHTML = '';
  els.codeEditor.value = '';

  const prompt = `Create ONLY valid Mermaid ${type} syntax — nothing else.
Do NOT use markdown code blocks.
Do NOT add explanations.
Start directly with the diagram type keyword.
Topic: ${topic}

Make it detailed, educational, well-structured and readable.
Use good indentation.`.trim();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${key}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",   // or "deepseek-r1", "qwen-2.5-coder-32b" etc.
        messages: [{role:"user", content:prompt}],
        temperature: 0.15,
        max_tokens: 1800
      })
    });

    if (!res.ok) throw new Error(await res.text());

    const data = await res.json();
    let code = data.choices[0].message.content.trim();

    // Aggressive cleanup — most common LLM mistakes
    code = code
      .replace(/^```(?:mermaid)?\s*/i, '')
      .replace(/```$/g, '')
      .replace(/^`+/, '')
      .replace(/`+$/, '')
      .trim();

    els.codeEditor.value = code;

    await renderMermaid(code);
  }
  catch (err) {
    console.error(err);
    alert("Generation failed\n\n" + (err.message || err));
  }
  finally {
    els.loader.style.display = 'none';
    els.generateBtn.disabled = false;
  }
};

async function renderMermaid(code) {
  if (!code.trim()) return;

  try {
    const { svg } = await mermaid.render('mermaid-'+Date.now(), code);
    els.mermaidDiv.innerHTML = svg;
    els.downloadBtn.disabled = false;
  } catch (e) {
    els.mermaidDiv.innerHTML = `<pre style="color:#c00; font-family:monospace; white-space:pre-wrap;">${e.message || e}\n\n${code}</pre>`;
  }
}

els.renderEditedBtn.onclick = () => {
  renderMermaid(els.codeEditor.value);
};

els.enlargeBtn.onclick = () => {
  const svg = els.mermaidDiv.querySelector('svg');
  if (!svg) return;
  const str = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([str], {type: 'image/svg+xml'});
  window.open(URL.createObjectURL(blob), '_blank');
};

els.downloadBtn.onclick = async () => {
  const format = document.querySelector('input[name="exportFormat"]:checked')?.value || 'png';
  const topic = els.topic.value.trim().replace(/[^a-z0-9]+/gi,'-').toLowerCase() || 'diagram';

  els.loader.style.display = 'block';

  try {
    const canvas = await html2canvas(els.mermaidDiv, {
      scale: 3,
      backgroundColor: '#ffffff',
      logging: false,
      useCORS: true,
      allowTaint: true
    });

    const dataURL = canvas.toDataURL('image/png');

    if (format === 'png') {
      const a = document.createElement('a');
      a.href = dataURL;
      a.download = `chart-${topic}.png`;
      a.click();
    } else {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const w = 190;
      const h = canvas.height * w / canvas.width;

      pdf.setFontSize(18);
      pdf.text(els.topic.value.trim(), 105, 18, { align: 'center' });

      if (h > 260) {
        // very basic multi-page support
        pdf.addImage(dataURL, 'PNG', 10, 30, w, 260);
        pdf.addPage();
        pdf.addImage(dataURL, 'PNG', 10, -230 + h, w, h);
      } else {
        pdf.addImage(dataURL, 'PNG', 10, 30, w, h);
      }

      pdf.save(`chart-${topic}.pdf`);
    }
  } catch (e) {
    console.error(e);
    alert("Export failed");
  } finally {
    els.loader.style.display = 'none';
  }
};
</script>
</body>
</html>
